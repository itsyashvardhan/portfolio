<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Edge VLLM Inference Pipeline: Input Processing, Vision Encoder (primary bottleneck), Projector, LLM Decoder" width="900" height="280" viewBox="0 0 900 280" style="width:100%;height:auto;display:block;border-radius:8px;">
  <rect width="900" height="280" fill="#0f172a" rx="8"/>
  <!-- Title -->
  <text x="450" y="26" font-size="13" font-family="monospace" fill="#94a3b8" text-anchor="middle" font-weight="bold">Edge VLLM Inference Pipeline · TTFT = L_enc + L_proj + L_prefill(T)</text>

  <!-- Stage 1: Input Processing -->
  <rect x="30" y="60" width="160" height="140" rx="8" fill="#1e293b" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
  <text x="110" y="85" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">INPUT</text>
  <text x="110" y="100" font-size="13" fill="#e2e8f0" font-family="monospace" text-anchor="middle" font-weight="bold">Processing</text>
  <line x1="50" y1="115" x2="170" y2="115" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  <text x="110" y="133" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Resize to 224/384px</text>
  <text x="110" y="149" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Normalize pixels</text>
  <text x="110" y="165" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Resolution determines</text>
  <text x="110" y="179" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">encoder latency</text>
  <text x="110" y="196" font-size="9" fill="#475569" font-family="monospace" text-anchor="middle">L_preprocess ≈ trivial</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="130" x2="220" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Stage 2: Vision Encoder — HIGHLIGHTED as bottleneck -->
  <rect x="220" y="44" width="200" height="172" rx="8" fill="#1a2e1a" stroke="#10b981" stroke-width="2"/>
  <rect x="220" y="44" width="200" height="22" rx="8" fill="#10b981" opacity="0.2"/>
  <text x="320" y="59" font-size="9" fill="#10b981" font-family="monospace" text-anchor="middle" font-weight="bold">PRIMARY BOTTLENECK · 70-85% TTFT</text>
  <text x="320" y="83" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">VISION</text>
  <text x="320" y="98" font-size="13" fill="#10b981" font-family="monospace" text-anchor="middle" font-weight="bold">Encoder</text>
  <line x1="240" y1="113" x2="400" y2="113" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="320" y="131" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">CNN / ViT / Hybrid</text>
  <text x="320" y="147" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Extracts feature embeddings</text>
  <text x="320" y="163" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">576-1024 visual tokens</text>
  <text x="320" y="181" font-size="9" fill="#10b981" font-family="monospace" text-anchor="middle">L_enc: 1.6ms - 98ms</text>
  <text x="320" y="200" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Cache Cliff at L2/L3 boundary</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="130" x2="450" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Projector -->
  <rect x="450" y="60" width="180" height="140" rx="8" fill="#1e293b" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
  <text x="540" y="85" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">PROJECTOR</text>
  <text x="540" y="100" font-size="13" fill="#e2e8f0" font-family="monospace" text-anchor="middle" font-weight="bold">Alignment</text>
  <line x1="470" y1="115" x2="610" y2="115" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  <text x="540" y="133" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">MLP or Q-Former</text>
  <text x="540" y="149" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Aligns encoder space</text>
  <text x="540" y="165" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">with LLM token space</text>
  <text x="540" y="181" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Q-Former compresses 16x</text>
  <text x="540" y="196" font-size="9" fill="#475569" font-family="monospace" text-anchor="middle">L_proj: 15-80ms</text>

  <!-- Arrow 3 -->
  <line x1="630" y1="130" x2="660" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: LLM Decoder -->
  <rect x="660" y="60" width="200" height="140" rx="8" fill="#1e293b" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
  <text x="760" y="85" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">LLM</text>
  <text x="760" y="100" font-size="13" fill="#e2e8f0" font-family="monospace" text-anchor="middle" font-weight="bold">Decoder</text>
  <line x1="680" y1="115" x2="840" y2="115" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  <text x="760" y="133" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Prefill + Generation</text>
  <text x="760" y="149" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Autoregressive decode</text>
  <text x="760" y="165" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">Prefill scales with T</text>
  <text x="760" y="181" font-size="10" fill="#94a3b8" font-family="monospace" text-anchor="middle">(visual token count)</text>
  <text x="760" y="196" font-size="9" fill="#475569" font-family="monospace" text-anchor="middle">L_prefill(T)</text>

  <!-- Formula bar at bottom -->
  <rect x="30" y="222" width="840" height="40" rx="6" fill="#0a1628" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="450" y="238" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">TTFT Formula:</text>
  <text x="450" y="256" font-size="13" fill="#10b981" font-family="monospace" text-anchor="middle" font-weight="bold">TTFT = L_enc + L_proj + L_prefill(T)     where L_enc dominates at 70-85% of total</text>

  <!-- Source note -->
  <text x="450" y="275" font-size="9" fill="#334155" font-family="monospace" text-anchor="middle">Source: vllmarchitect.yashvardhan.dev · ICCCN 2026, Manchester UK</text>
</svg>
