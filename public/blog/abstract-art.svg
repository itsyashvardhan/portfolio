<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="25%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#0d4f3c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050d0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#0a2a5c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#030612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#1a0a3d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#08040f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="15%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#1a2a0a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#060804" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="85%" cy="60%" r="38%">
      <stop offset="0%" stop-color="#2a1a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d0800" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Base -->
  <rect width="1200" height="630" fill="#050810"/>
  <!-- Noise texture overlay -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <!-- Blob 1 — emerald/teal -->
  <ellipse cx="300" cy="220" rx="380" ry="280" fill="url(#g1)" filter="url(#blur2)"/>
  <!-- Blob 2 — deep blue -->
  <ellipse cx="900" cy="160" rx="420" ry="300" fill="url(#g2)" filter="url(#blur2)"/>
  <!-- Blob 3 — purple/violet -->
  <ellipse cx="720" cy="480" rx="360" ry="260" fill="url(#g3)" filter="url(#blur2)"/>
  <!-- Blob 4 — dark green -->
  <ellipse cx="180" cy="510" rx="300" ry="220" fill="url(#g4)" filter="url(#blur1)"/>
  <!-- Blob 5 — warm amber -->
  <ellipse cx="1020" cy="400" rx="280" ry="200" fill="url(#g5)" filter="url(#blur1)"/>
  <!-- Subtle highlight streaks -->
  <ellipse cx="600" cy="315" rx="500" ry="120" fill="none" stroke="rgba(16,185,129,0.04)" stroke-width="120" filter="url(#blur2)"/>
  <!-- Very faint grain overlay -->
  <rect width="1200" height="630" fill="url(#noise)" opacity="0.03"/>
</svg>
